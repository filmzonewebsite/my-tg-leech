name: On-Demand Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Your Telegram Chat ID'
        required: true
      torrent_url:
        description: 'Direct URL to .torrent file'
        required: true

jobs:
  leech:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Aria2)
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2

    - name: Install Python Dependencies
      run: |
        pip install pyrogram tgcrypto aria2p

    - name: Download .torrent file to Server
      run: |
        curl -L "${{ github.event.inputs.torrent_url }}" -o download.torrent

    - name: Start Aria2 Daemon
      run: |
        aria2c --enable-rpc --rpc-listen-all=true --rpc-allow-origin-all=true --max-concurrent-downloads=1 --file-allocation=none --daemon

    - name: Run Downloader Script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ github.event.inputs.chat_id }}
      run: |
        python leech.py
