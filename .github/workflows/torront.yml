name: On-Demand Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Your Telegram Chat ID'
        required: true
      torrent_url:
        description: 'Direct .torrent Link OR Magnet Link'
        required: true

jobs:
  leech:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Aria2)
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2

    - name: Install Python Dependencies
      run: |
        pip install pyrogram tgcrypto aria2p

    - name: Start Aria2 Daemon
      run: |
        aria2c --enable-rpc --rpc-listen-all=true --rpc-allow-origin-all=true --max-concurrent-downloads=1 --file-allocation=none --daemon

    - name: Run Downloader Script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ github.event.inputs.chat_id }}
        TORRENT_INPUT: ${{ github.event.inputs.torrent_url }}
      run: |
        # ලින්ක් එක Magnet එකක්ද නැද්ද කියා බලා ක්‍රියාත්මක වීම
        python -c "
        import os, aria2p, asyncio
        aria2 = aria2p.API(aria2p.Client(host='http://localhost', port=6800, secret=''))
        inp = os.environ.get('TORRENT_INPUT')
        if inp.startswith('magnet:'):
            aria2.add_magnet(inp)
            print('✅ Magnet Link Added!')
        else:
            import requests
            r = requests.get(inp, allow_redirects=True)
            with open('download.torrent', 'wb') as f:
                f.write(r.content)
            aria2.add_torrent('download.torrent')
            print('✅ .torrent File Added!')
        "
        python leech.py
        
